<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HBnB - Place Details</title>
  <link rel="icon" href="assets/icon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="header-content">
      <img src="assets/logo.png" alt="HBnB logo" class="logo">
      <div class="brand">
        <h1>HBnB Explorer</h1>
        <p>Place overview and guest feedback</p>
      </div>
      <nav class="main-nav" aria-label="Main navigation">
        <a href="index.html">Places</a>
        <a href="place.html" aria-current="page">Place Details</a>
        <a href="add_review.html">Add Review</a>
      </nav>
      <a href="login.html" class="login-button" id="login-link">Login</a>
      <button type="button" class="secondary-button is-hidden" id="logout-button">Logout</button>
    </div>
  </header>

  <main>
    <section class="page-intro">
      <h2>Place Details</h2>
      <p>Everything you need to know before booking.</p>
    </section>

    <article class="place-details" id="place-details">
      <p class="page-message" id="place-message" aria-live="polite"></p>
    </article>

    <section aria-label="Reviews">
      <h3>Guest Reviews</h3>
      <div class="review-list" id="review-list">
        <p class="page-message" id="review-message"></p>
      </div>
    </section>

    <section class="add-review is-hidden" id="add-review" aria-label="Add a review"></section>
  </main>

  <footer class="site-footer">
    <p>All rights reserved.</p>
  </footer>

  <script src="scripts.js"></script>
</body>
</html>
