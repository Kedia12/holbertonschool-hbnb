<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HBnB - Add Review</title>
    <link rel="icon" href="logo.png" type="image/png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="container header-inner">
        <a href="index.html" class="brand" aria-label="HBnB home">
          <img src="logo.png" alt="HBnB logo" class="logo" />
          <strong>HBnB</strong>
        </a>
        <nav aria-label="Main navigation">
          <ul>
            <li><a href="index.html">Places</a></li>
            <li><a href="place.html">Place Details</a></li>
            <li><a href="add_review.html" aria-current="page">Add Review</a></li>
            <li><a href="login.html" id="login-link" class="login-button">Login</a></li>
            <li><a href="#" id="logout-link" class="login-button" hidden>Logout</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section class="container add-review" aria-labelledby="add-review-title">
        <h1 id="add-review-title" class="page-title">Add Review Form</h1>
        <p id="review-target" class="muted">Submitting review for place: -</p>
        <p id="review-feedback" class="error-message" role="alert" hidden></p>
        <p id="review-success" class="success-message" role="status" hidden></p>

        <form id="review-form" class="form" action="#" method="post" novalidate>
          <div class="form-group">
            <label for="rating">Rating</label>
            <select id="rating" name="rating" required>
              <option value="">Select rating</option>
              <option value="5">5 - Excellent</option>
              <option value="4">4 - Very good</option>
              <option value="3">3 - Good</option>
              <option value="2">2 - Fair</option>
              <option value="1">1 - Poor</option>
            </select>
          </div>

          <div class="form-group">
            <label for="comment">Comment</label>
            <textarea id="comment" name="comment" required></textarea>
          </div>

          <button type="submit" class="button">Submit Review</button>
        </form>
      </section>
    </main>

    <footer>
      <div class="container">
        <p>All rights reserved.</p>
      </div>
    </footer>
    <script src="scripts/add_review.js"></script>
  </body>
</html>
