<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB | Login</title>
    <meta name="description" content="Sign in to the HBnB web client.">
    <link rel="icon" href="assets/icon.png">
    <link rel="stylesheet" href="styles.css">
    <script defer src="scripts.js"></script>
</head>
<body data-page="login">
    <header class="site-header">
        <div class="page-shell">
            <a class="brand" href="index.html" aria-label="HBnB home">
                <img class="logo" src="assets/logo.png" alt="HBnB logo">
                <span class="brand-copy">
                    <strong>HBnB</strong>
                    <span>Simple web client</span>
                </span>
            </a>
            <div class="header-actions">
                <nav class="nav-links" aria-label="Primary navigation">
                    <a class="nav-link" href="index.html">Places</a>
                    <a class="nav-link" href="login.html">Login</a>
                </nav>
                <a class="login-button" data-auth-action href="login.html">Login</a>
            </div>
        </div>
    </header>

    <main class="page-shell">
        <section class="form-card">
            <h1>Welcome back</h1>
            <p class="section-description">Use your account credentials to open the places dashboard.</p>
            <div class="status" data-login-status>Enter your credentials to continue.</div>
            <form class="form-grid" data-login-form novalidate>
                <div class="form-field">
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" autocomplete="email" required placeholder="admin@hbnb.io">
                </div>
                <div class="form-field">
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" autocomplete="current-password" required placeholder="Your password">
                </div>
                <div class="form-actions">
                    <button class="submit-button" type="submit">Sign in</button>
                    <a class="secondary-button" href="index.html">Back to places</a>
                </div>
            </form>
            <p class="form-hint">If you are using the seeded admin account, the default email is <strong>admin@hbnb.io</strong>.</p>
        </section>
    </main>

    <footer class="footer">
        <p>HBnB Evolution. All rights reserved.</p>
    </footer>
</body>
</html>
