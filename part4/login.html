<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HBnB - Login</title>
    <link rel="icon" href="logo.png" type="image/png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="container header-inner">
        <a href="index.html" class="brand" aria-label="HBnB home">
          <img src="logo.png" alt="HBnB logo" class="logo" />
          <strong>HBnB</strong>
        </a>
        <nav aria-label="Main navigation">
          <ul>
            <li><a href="index.html">Places</a></li>
            <li><a href="place.html">Place Details</a></li>
            <li><a href="add_review.html">Add Review</a></li>
            <li><a href="login.html" class="login-button" aria-current="page">Login</a></li>
            <li><a href="#" id="logout-link" class="login-button" hidden>Logout</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section class="container" aria-labelledby="login-title">
        <h1 id="login-title" class="page-title">Login Form</h1>
        <p id="error-message" class="error-message" role="alert" hidden></p>
        <form id="login-form" action="#" method="post" novalidate>
          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required autocomplete="email" />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" required autocomplete="current-password" />
          </div>

          <button type="submit" class="button">Sign in</button>
        </form>
      </section>
    </main>

    <footer>
      <div class="container">
        <p>All rights reserved.</p>
      </div>
    </footer>
    <script src="scripts/login.js"></script>
  </body>
</html>
